<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaLab - 媒体工具集</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="app">
    <!-- 侧边导航 - 动态生成 -->
    <nav id="sidebar">
      <div class="sidebar-header">
        <div class="logo">ML</div>
        <h1 class="brand">MediaLab</h1>
      </div>
      <ul class="nav-menu" id="nav-menu-container">
        <!-- 导航菜单将通过 JS 动态生成 -->
      </ul>
      <div class="sidebar-footer">
        <span class="version" id="app-version">加载中...</span>
      </div>
    </nav>

    <!-- 主内容区 - 工具页面将动态加载 -->
    <main id="content">
      <!-- 工具页面容器 -->
      <div id="tools-container"></div>

      <!-- 欢迎页面 -->
      <section id="welcome-page" class="tool-page active">
        <div class="placeholder">
          <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
            <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/>
            <line x1="7" y1="2" x2="7" y2="22"/>
            <line x1="17" y1="2" x2="17" y2="22"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <line x1="2" y1="7" x2="7" y2="7"/>
            <line x1="2" y1="17" x2="7" y2="17"/>
            <line x1="17" y1="7" x2="22" y2="7"/>
            <line x1="17" y1="17" x2="22" y2="17"/>
          </svg>
          <h2>欢迎使用 MediaLab</h2>
          <p>请从左侧菜单选择一个工具开始使用</p>
        </div>
      </section>
    </main>
  </div>

  <!-- Toast 通知容器 -->
  <div id="toast-container"></div>

  <!-- 加载脚本 -->
  <script src="js/app.js"></script>
  <script src="js/module-loader.js"></script>
</body>
</html>
